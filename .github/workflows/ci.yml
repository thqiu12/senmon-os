name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, lint, audit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: "file:./ci.db"
      SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
      NODE_ENV: "test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Run security regression tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build
        run: npm run build
