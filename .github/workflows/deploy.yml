name: Deploy

on:
  push:
    branches: ["chore/security-hardening", "main", "master"]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "テスト失敗でもデプロイ続行（緊急時のみ）"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]

# 同一ブランチへの連続 push 時は古い実行をキャンセル（最新だけデプロイ）
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # デプロイ途中でキャンセルすると半端な状態になるので注意

jobs:
  # ---------------- テスト (test.yml と同じ job を再利用) ----------------
  test:
    name: 事前テスト
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run test:unit
        # vitest.setup.ts が PID 付きパスで DB を作る。事前 db push は不要。
        env:
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"
      # 型エラーは過去 2 回事故ったので本番ビルドも検証
      - run: NODE_OPTIONS="--max-old-space-size=2048" npm run build
        env:
          DATABASE_URL: "file:/tmp/build.db"
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"
      # CSS の生成を確認。崩れていれば deploy job 自体を走らせない。
      - name: Verify CSS build output
        run: |
          CSS_COUNT=$(find .next/static/css -name "*.css" 2>/dev/null | wc -l)
          if [ "$CSS_COUNT" -lt 1 ]; then
            echo "::error::No CSS file in .next/static/css — abort deploy"
            exit 1
          fi
          echo "✓ CSS verified ($CSS_COUNT file(s))"

  # ---------------- VPS へ SSH デプロイ ----------------
  deploy:
    name: 本番デプロイ (Sakura VPS)
    needs: test
    if: always() && (needs.test.result == 'success' || github.event.inputs.skip_tests == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'http://160.16.132.198' }}

    steps:
      - uses: actions/checkout@v4

      - name: Secrets 設定済みか確認（未設定なら早期スキップ）
        id: precheck
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ]; then
            {
              echo "## ⚠️ デプロイ Secrets が未設定のためスキップ"
              echo ""
              echo "GitHub Actions から SSH デプロイするには 3 つの Secret が必要です:"
              echo ""
              echo "| Secret | 状態 |"
              echo "|---|---|"
              [ -z "$SSH_PRIVATE_KEY" ] && echo "| \`SSH_PRIVATE_KEY\` | ❌ 未設定 |" || echo "| \`SSH_PRIVATE_KEY\` | ✅ 設定済み |"
              [ -z "$SSH_HOST" ]        && echo "| \`SSH_HOST\` | ❌ 未設定 |"        || echo "| \`SSH_HOST\` | ✅ 設定済み |"
              [ -z "$SSH_USER" ]        && echo "| \`SSH_USER\` | ❌ 未設定 |"        || echo "| \`SSH_USER\` | ✅ 設定済み |"
              echo ""
              echo "### 設定方法"
              echo ""
              echo "1. ローカル Mac で SSH 鍵生成:"
              echo "   \`\`\`"
              echo "   ssh-keygen -t ed25519 -f ~/.ssh/senmon_deploy -N \"\""
              echo "   \`\`\`"
              echo ""
              echo "2. 公開鍵を VPS の deploy ユーザーに登録:"
              echo "   \`\`\`"
              echo "   cat ~/.ssh/senmon_deploy.pub | ssh ubuntu@160.16.132.198 \\\\"
              echo "     'sudo tee -a /home/deploy/.ssh/authorized_keys'"
              echo "   \`\`\`"
              echo ""
              echo "3. GitHub Secrets 登録: <https://github.com/${{ github.repository }}/settings/secrets/actions>"
              echo "   - \`SSH_PRIVATE_KEY\`: \`cat ~/.ssh/senmon_deploy\` の出力全体"
              echo "   - \`SSH_HOST\`: \`160.16.132.198\`"
              echo "   - \`SSH_USER\`: \`deploy\`"
              echo ""
              echo "詳細: \`CICD.md\`"
              echo ""
              echo "🛡 並行して動いている cron auto-deploy.sh が 1〜2 分以内に最新コミットを反映しますので、デプロイ自体は実行されています。"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::SSH_PRIVATE_KEY/SSH_HOST/SSH_USER が未設定。デプロイをスキップ（cron 経由のフォールバックは継続稼働中）"
            echo "deploy_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deploy_skipped=false" >> "$GITHUB_OUTPUT"
          echo "✓ 全 Secrets 設定済み、デプロイ開始"

      - name: SSH 鍵セットアップ
        if: steps.precheck.outputs.deploy_skipped == 'false'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: VPS でデプロイ実行
        id: deploy
        if: steps.precheck.outputs.deploy_skipped == 'false'
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "GITHUB_ACTOR='${{ github.actor }}' bash /srv/senmon/app/scripts/deploy/ci-deploy.sh"
        env:
          # CI script 内のロールバック判定用にコミット SHA を渡す
          GITHUB_SHA: ${{ github.sha }}

      - name: 外部ヘルスチェック
        if: steps.precheck.outputs.deploy_skipped == 'false' && steps.deploy.outcome == 'success'
        run: |
          chmod +x scripts/deploy/healthcheck.sh
          BASE_URL="${{ vars.PRODUCTION_URL || 'http://160.16.132.198' }}" \
          EXPECTED_SHA="${{ github.sha }}" \
            bash scripts/deploy/healthcheck.sh

      - name: デプロイ結果サマリ
        if: always() && steps.precheck.outputs.deploy_skipped == 'false'
        run: |
          {
            echo "## デプロイ結果"
            echo ""
            echo "| 項目 | 値 |"
            echo "|---|---|"
            echo "| ブランチ | \`${{ github.ref_name }}\` |"
            echo "| コミット | \`${{ github.sha }}\` |"
            echo "| 実行者 | ${{ github.actor }} |"
            echo "| URL | ${{ vars.PRODUCTION_URL || 'http://160.16.132.198' }} |"
            if [ "${{ steps.deploy.outcome }}" = "success" ]; then
              echo "| 結果 | ✅ 成功 |"
            else
              echo "| 結果 | ❌ 失敗（前バージョンで稼働継続 or 自動ロールバック済み）|"
              echo ""
              echo "確認: \`ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} tail -60 /srv/senmon/backup/ci-deploy.log\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------- デプロイ失敗時の通知 ----------------
  notify-failure:
    name: 失敗通知
    needs: [test, deploy]
    if: failure() && needs.test.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: 失敗ステップを集約
        run: |
          echo "::error::デプロイ失敗 (commit: ${{ github.sha }})"
          echo "詳細: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
