name: Deploy

on:
  push:
    branches: ["chore/security-hardening", "main"]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "テスト失敗でもデプロイ続行（緊急時のみ）"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]

# 同一ブランチへの連続 push 時は古い実行をキャンセル（最新だけデプロイ）
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # デプロイ途中でキャンセルすると半端な状態になるので注意

jobs:
  # ---------------- テスト (test.yml と同じ job を再利用) ----------------
  test:
    name: 事前テスト
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate --accept-data-loss
        env: { DATABASE_URL: "file:/tmp/senmon-vitest.db" }
      - run: npm run test:unit
        env:
          DATABASE_URL: "file:/tmp/senmon-vitest.db"
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"
      # 型エラーは過去 2 回事故ったので本番ビルドも検証
      - run: NODE_OPTIONS="--max-old-space-size=2048" npm run build
        env:
          DATABASE_URL: "file:/tmp/senmon-vitest.db"
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"

  # ---------------- VPS へ SSH デプロイ ----------------
  deploy:
    name: 本番デプロイ (Sakura VPS)
    needs: test
    if: always() && (needs.test.result == 'success' || github.event.inputs.skip_tests == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'http://160.16.132.198' }}

    steps:
      - uses: actions/checkout@v4

      - name: SSH 鍵セットアップ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: VPS でデプロイ実行
        id: deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "GITHUB_ACTOR='${{ github.actor }}' bash /srv/senmon/app/scripts/deploy/ci-deploy.sh"
        env:
          # CI script 内のロールバック判定用にコミット SHA を渡す
          GITHUB_SHA: ${{ github.sha }}

      - name: 外部ヘルスチェック
        if: success()
        run: |
          chmod +x scripts/deploy/healthcheck.sh
          BASE_URL="${{ vars.PRODUCTION_URL || 'http://160.16.132.198' }}" \
          EXPECTED_SHA="${{ github.sha }}" \
            bash scripts/deploy/healthcheck.sh

      - name: デプロイ結果サマリ
        if: always()
        run: |
          echo "## デプロイ結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 実行者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ vars.PRODUCTION_URL || 'http://160.16.132.198' }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "| 結果 | ✅ 成功 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 結果 | ❌ 失敗（前バージョンで稼働継続 or 自動ロールバック済み）|" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "確認: \`ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} tail -60 /srv/senmon/backup/ci-deploy.log\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------- デプロイ失敗時の通知（PR 等にコメント） ----------------
  notify-failure:
    name: 失敗通知
    needs: [test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 失敗ステップを集約
        run: |
          echo "::error::デプロイ失敗 (commit: ${{ github.sha }})"
          echo "詳細: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
