name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "chore/security-hardening"]

jobs:
  # ============================================================
  # 単体テスト + 業務ロジックテスト (Vitest)
  # ============================================================
  unit:
    name: 単体テスト
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: compass_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: テナント隔離ガード（route が base prisma を直接使っていないか）
        run: npm run lint:tenant

      - name: Prisma generate
        run: npx prisma generate

      - name: Run Vitest
        # vitest.setup.ts が PID ごとに専用 schema(test_<pid>)を作成し並列実行を隔離する。
        run: npm run test:unit
        env:
          DATABASE_URL_BASE: "postgresql://postgres:postgres@localhost:5432/compass_test"
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"
          NODE_ENV: "test"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 14

  # ============================================================
  # E2E + API テスト (Playwright)
  # ============================================================
  e2e:
    name: E2E + API テスト
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: compass_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # 全 step / playwright webServer が継承(seed は webServer 側で 1 回だけ実行)
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/compass_test"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/compass_test"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma generate
        run: npx prisma generate

      - name: Prepare test DB schema
        # ビルド用にスキーマを作成。seed は playwright の webServer が行うのでここでは push のみ。
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Build Next.js
        run: NODE_OPTIONS="--max-old-space-size=2048" npm run build
        env:
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"

      - name: Verify CSS build output
        # ビルド成果物に CSS が含まれているか確認。Tailwind 設定崩れの早期検知。
        run: |
          CSS_COUNT=$(find .next/static/css -name "*.css" 2>/dev/null | wc -l)
          if [ "$CSS_COUNT" -lt 1 ]; then
            echo "::error::No CSS file in .next/static/css — Tailwind build broke"
            ls -la .next/static/ || true
            exit 1
          fi
          # 主要なユーティリティクラスが含まれているか軽くチェック
          CSS_FILE=$(find .next/static/css -name "*.css" | head -1)
          for cls in "bg-navy-800" "rounded-lg" "text-white"; do
            if ! grep -q "$cls" "$CSS_FILE" 2>/dev/null; then
              echo "::warning::Class $cls not found in $CSS_FILE — possible purge over-aggressive"
            fi
          done
          echo "✓ CSS verified: $CSS_FILE ($(wc -c < "$CSS_FILE") bytes)"

      - name: Run Playwright
        # webServer が db push + seed + demo-seed + npm run dev を実行(DATABASE_URL は job env を継承)。
        run: npm run test:e2e
        env:
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"
          NEXT_PUBLIC_BASE_URL: "http://localhost:3070"
          UPLOAD_DIR: "/tmp/senmon-test-uploads"
          SEED_ADMIN_USERNAME: "admin"
          SEED_ADMIN_PASSWORD: "TestAdmin2026!"
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ============================================================
  # ビルド検証（型エラー検出 — 過去 2 度刺さったので CI 化）
  # ============================================================
  typecheck:
    name: 型・ビルド検証
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: compass_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/compass_test"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/compass_test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - name: Prepare DB schema
        run: npx prisma db push --skip-generate --accept-data-loss
      - name: Next.js build (型 + lint チェック)
        run: NODE_OPTIONS="--max-old-space-size=2048" npm run build
        env:
          SESSION_SECRET: "test-session-secret-32chars-1234567890abcdef"
          CSRF_SECRET: "test-csrf-secret-32chars-1234567890abcdef"
